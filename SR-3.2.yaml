      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '401':
          content:
            application/json:
              example:
                message: invalid access token
                code: InvalidAccessTokenError
              schema:
                $ref: '#/components/schemas/ErrorResponseWithCode'
          description: Unauthorized
        '403':
          content:
            application/json:
              example:
                message: not authenticated
                code: UnauthenticatedError
              schema:
                $ref: '#/components/schemas/ErrorResponseWithCode'
          description: Forbidden
        '422':
          content:
            application/json:
              examples:
                Invalid Group Error:
                  summary: Invalid Group Error
                  value:
                    message: group {group_id} deleted or access denied
                    code: InvalidGroupError
                Invalid References Error:
                  summary: Invalid References Error
                  value:
                    message: references {reference_ids} deleted or access denied
                    code: InvalidReferencesError
              schema:
                $ref: '#/components/schemas/ErrorResponseWithCode'
          description: Unprocessable Entity
