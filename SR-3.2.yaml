openapi: 3.0.0
info:
  title: Super RAG API
  description: |

    # API Specification

    ## Status Codes

    APIs return status codes based on the resChatult. Below are the status codes and their meanings.

    ### Response Codes for Successful Execution

    If the process finishes without any issues, the response will have one of the following status codes:

    | HTTP Status Code | Status Name | Description |
    | --- | --- | --- |
    | 200 | OK | The request was successful. |
    | 201 | Created | The request was successful, and a new resource was created. |
    | 204 | No Content | The request was successful, but there is no content to return. |

    ### Response Codes for Client Errors

    The following table lists the response codes for errors caused by client-side issues, such as invalid request data.

    | HTTP Status Code | Status Name | Description |
    | --- | --- | --- |
    | 400 | Bad Request | The request is invalid or malformed. |
    | 403 | Forbidden | The request is authenticated but lacks the necessary permissions. |
    | 404 | Not Found | The specified resource could not be found. |
    | 405 | Method Not Allowed | The request method (GET, POST, PUT, PATCH, DELETE) is not supported for this endpoint. |
    | 409 | Conflict | The specified resource already exists. |
    | 422 | Unprocessable Entity | The request is well-formed but contains invalid data. |

    ### Response Codes for Server Errors

    The following table lists the response codes for errors caused by server-side issues.

    | HTTP Status Code | Status Name | Description |
    | --- | --- | --- |
    | 500 | Internal Server Error | The server encountered an unexpected condition that prevented it from fulfilling the request. |
  version: 3.1.0
