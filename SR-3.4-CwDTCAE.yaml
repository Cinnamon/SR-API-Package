          collections:
            type: array
            items:
              $ref: '#/components/schemas/AssistantCollection'
            title: Collections
            description: Collections assigned to the assistant; references belong to collections
          created_at:
            type: string
            format: date-time
            title: Created At
          updated_at:
            type: string
            format: date-time
            title: Updated At
          created_by:
            $ref: '#/components/schemas/UserResponse'
          updated_by:
            $ref: '#/components/schemas/UserResponse'
        title: AssistantDetail
      AssistantCollection:
        type: object
        properties:
          id:
            type: string
            format: uuid
            title: Collection Id
          name:
            type: string
            title: Name
            description: Name of the collection
          reference_ids:
            type: array
            items:
              anyOf:
                - type: string
