                  code: MaxAttachmentsSizeExceededError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Request Entity Too Large
          '422':
            content:
              application/json:
                example:
                  message: 'body.field1.field2: field required, ...'
                  code: ValidationError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unprocessable Entity

    /api/v3.4/chats/{chat_id}/:
      get:
        tags:
          - Chat endpoints 3.4
        summary: Get Chat
        description: Retrieve conversation details, including messages and evidence
        operationId: get_chat_api_v3_4_chats__chat_id___get
        security:
          - MyHTTPBearer: []
        parameters:
          - name: chat_id
            in: path
            required: true
            schema:
              anyOf:
                - type: string
                - type: string
                  format: uuid
              title: Chat Id
        responses:
          '200':
            description: Success
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChatWithMessagesResponse3.4'
          '401':
            content:
              application/json:
                example:
                  message: invalid access token
                  code: InvalidAccessTokenError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unauthorized
          '403':
            content:
              application/json:
                example:
                  message: not authenticated
                  code: UnauthenticatedError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Forbidden
          '404':
            content:
              application/json:
                example:
                  message: chat {chat_id} not found
                  code: ChatNotFoundError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Not Found
          '422':
            content:
              application/json:
                example:
                  message: 'body.field1.field2: field required, ...'
                  code: ValidationError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unprocessable Entity

    /api/v3/ui/config/web-search-policy/:
      get:
        tags:
          - Config endpoints
        summary: Get Web Search Config
        description: Get global web search configuration.
        operationId: get_web_search_config_api_v3_ui_config_web_search_policy__get
        responses:
          "200":
            description: Successful Response
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/WebSearchConfigResponse'
          "401":
            description: Unauthorized
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: invalid access token
                  code: InvalidAccessTokenError
          "403":
            description: Forbidden
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: not authenticated
                  code: UnauthenticatedError
          "422":
            description: Unprocessable Entity
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: 'body.field1.field2: field required, ...'
                  code: ValidationError
        security:
          - MyHTTPBearer: [ ]
      put:
        tags:
          - Config endpoints
        summary: Update Web Search Config
        description: Enable or disable global web search.
        operationId: update_web_search_config_api_v3_ui_config_web_search_policy__put
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSearchConfigUpdate'
          required: true
        responses:
          "200":
            description: Successful Response
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/WebSearchConfigResponse'
          "401":
            description: Unauthorized
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: invalid access token
                  code: InvalidAccessTokenError
          "403":
            description: Forbidden
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: not authenticated
                  code: UnauthenticatedError
          "422":
            description: Unprocessable Entity
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
                example:
                  message: 'body.field1.field2: field required, ...'
                  code: ValidationError
        security:
          - MyHTTPBearer:
              - config:create
              - config:update

    # --- SR 3.4: User role management ---
    /api/v3.4/users/{user_id}/role/:
      patch:
        tags:
          - Users
        summary: Change User Role
        description: Change a user's role and replace their direct permissions.
        operationId: change_user_role_api_v3_4_users__user_id__role__patch
        security:
          - MyHTTPBearer:
              - 'user:update'
        parameters:
          - name: user_id
            in: path
            required: true
            schema:
              anyOf:
                - type: string
                - type: string
                  format: uuid
              title: User Id
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleChangePayload'
        responses:
          '200':
            description: Success
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/app__api__v3__payload__users__UserResponse'
                example:
                  id: 57e1a7a87af0413183b5ea6d8620a222
                  username: generaluser2@example.com
                  last_name: New last name
                  first_name: New first name
                  display_name: New last name New first name
                  role: User
                  language: en
                  created_at: '2025-02-10T07:43:06.944258Z'
                  updated_at: '2025-02-10T07:46:17.809532Z'
                  force_password_change: false
                  ai_settings:
                    indexing:
                      chunk_size: 1
                    llm:
                      language: auto-detect
          '401':
            content:
              application/json:
                example:
                  message: invalid access token
                  code: InvalidAccessTokenError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unauthorized
          '403':
            content:
              application/json:
                example:
                  message: not enough permission to perform this action
                  code: NoPermissionError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Forbidden
          '404':
            content:
              application/json:
                example:
                  message: user id {userid} not found
                  code: UserNotFoundError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Not Found
          '422':
            content:
              application/json:
                example:
                  message: 'body.field1.field2: field required, ...'
                  code: ValidationError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unprocessable Entity

