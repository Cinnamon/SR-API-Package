          id:
            type: string
            title: Id
          username:
            type: string
            title: Username
          last_name:
            anyOf:
              - type: string
              - nullable: true
            title: Last Name
          first_name:
            type: string
            title: First Name
          display_name:
            type: string
            title: Display Name
          role:
            $ref: '#/components/schemas/Role'
          language:
            $ref: '#/components/schemas/Language'
          created_at:
            type: string
            format: date-time
            title: Created At
          updated_at:
            type: string
            format: date-time
            title: Updated At
          last_login:
            anyOf:
              - type: string
                format: date-time
              - nullable: true
            title: Last Login
          force_password_change:
            type: boolean
            title: Force Password Change
            default: false
        type: object
        required:
          - id
          - username
          - last_name
          - first_name
          - display_name
          - role
          - language
          - created_at
          - updated_at
        title: UserResponse
      AssistantListResponse:
        type: object
        required:
          - total
          - assistants
        properties:
          total:
