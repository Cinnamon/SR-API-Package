                      message: invalid parent ID {parent_id}
                      code: InvalidParentIDError
                  Token Limits Exceeded Error:
                    summary: Token Limits Exceeded Error
                    value:
                      message: exceeded token limits for {level}{obj_id}
                      code: TokenLimitsExceededError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Bad Request
          '401':
            content:
              application/json:
                example:
                  message: invalid access token
                  code: InvalidAccessTokenError
                schema:
                  $ref: '#/components/schemas/ErrorResponseWithCode'
            description: Unauthorized
          '403':
            content:
              application/json:
                example:
