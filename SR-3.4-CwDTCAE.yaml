        title: WebSearchConfigResponse
      WebSearchConfigUpdate:
        properties:
          system_web_search_allowed:
            type: boolean
            title: System Web Search Allowed
            description: Enable or disable global web search features
        type: object
        required:
          - system_web_search_allowed
        title: WebSearchConfigUpdate
      UserResponse:
