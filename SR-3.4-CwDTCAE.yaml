  openapi: 3.0.0
  info:
    title: Super RAG API
    description: |

      # API Specification

      ## Status Codes

      APIs return status codes based on the resChatult. Below are the status codes and their meanings.

      ### Response Codes for Successful Execution

      If the process finishes without any issues, the response will have one of the following status codes:

      | HTTP Status Code | Status Name | Description |
      | --- | --- | --- |
      | 200 | OK | The request was successful. |
      | 201 | Created | The request was successful, and a new resource was created. |
      | 204 | No Content | The request was successful, but there is no content to return. |

      ### Response Codes for Client Errors

      The following table lists the response codes for errors caused by client-side issues, such as invalid request data.

      | HTTP Status Code | Status Name | Description |
      | --- | --- | --- |
      | 400 | Bad Request | The request is invalid or malformed. |
      | 403 | Forbidden | The request is authenticated but lacks the necessary permissions. |
      | 404 | Not Found | The specified resource could not be found. |
      | 405 | Method Not Allowed | The request method (GET, POST, PUT, PATCH, DELETE) is not supported for this endpoint. |
      | 409 | Conflict | The specified resource already exists. |
      | 422 | Unprocessable Entity | The request is well-formed but contains invalid data. |

      ### Response Codes for Server Errors

      The following table lists the response codes for errors caused by server-side issues.

      | HTTP Status Code | Status Name | Description |
      | --- | --- | --- |
      | 500 | Internal Server Error | The server encountered an unexpected condition that prevented it from fulfilling the request. |

      ## SR 3.4 (this spec contains only 3.4 endpoints)

      - **FR1** Assistant discovery: `GET /api/v3.4/assistants/`, `GET /api/v3.4/assistants/{assistant_id}/` (list and get by ID with collections; each collection contains reference_ids).
      - **FR2** Assistant-bound collections: In `POST /api/v3.4/chats/{chat_id}/messages/`, when `collection_ids` is omitted or empty, the server SHALL use the collections assigned to the chat's assistant_id (assistant-bound collections). When provided, server uses the given collection_ids. SR 3.2 (`POST /api/v3.2/chats/{chat_id}/messages/`) requires explicit collection_ids. Same request/response schema for both versions. See SR 3.2 spec for full message endpoint details.
      - **FR3** Image retrieval: `POST /api/v3.4/images/` (request body contains S3 path), `POST /api/v3.4/images/download`, `GET /api/v3.4/references/{reference_id}/images` (single image, zip of multiple, zip of all images for a reference); caching and authorization required.
      - **FR4** Reference chunks: `GET /api/v3.4/references/{reference_id}/chunks `; caching and authorization required.
    version: 3.4.0
  paths:
  # --- SR 3.4: Assistant-bound collections (FR2) ---
    /api/v3.4/chats/{chat_id}/messages/:
      post:
        tags:
          - Chat endpoints 3.4
        summary: Create New Message
        description: |
          Add a new message to a conversation. Same request/response schema as
          `POST /api/v3.2/chats/{chat_id}/messages/` (see SR 3.2 spec).

          **Collection resolution (SR 3.2 vs SR 3.4):**
          - **SR 3.2** (`/api/v3.2/...`): Client MUST pass `collection_ids` in the
            request body. Server uses only the collections explicitly provided.
          - **SR 3.4** (`/api/v3.4/...`): When `collection_ids` is omitted or
            empty, the server SHALL use the collections assigned to the chat's
            assistant (assistant-bound collections). When `collection_ids` is
            provided, server uses those collections. Behavior MUST be deterministic.

          **Search mode (SR 3.4):** The optional `web_search_mode` field is a
          string selecting the retrieval strategy. Allowed values are
          `internal_only`, `web_only`, and `internal_and_web`. When the field
          is null/omitted, the server SHALL fall back to `internal_only`.
        operationId: create_new_message_api_v3_4_chats__chat_id__messages__post
        security:
          - MyHTTPBearer: []
        parameters:
          - name: chat_id
            in: path
            required: true
            schema:
              anyOf:
                - type: string
                - type: string
                  format: uuid
              title: Chat Id
