            type: integer
            default: 0
            title: Skip
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            title: Limit
        - name: sort
          in: query
          required: false
          schema:
            type: string
            description: |

              Provided in string, representing a column in the actual entity table. In case of relational columns, `field` could be provided as a path to the column, separated by a `.`. E.g. `created_by.organization.id`.

              Adding `-` before the column name makes the order become descending. E.g. `-id`, -`created_at`.
            default: id
            title: Sort
          description: |

            Provided in string, representing a column in the actual entity table. In case of relational columns, `field` could be provided as a path to the column, separated by a `.`. E.g. `created_by.organization.id`.

            Adding `-` before the column name makes the order become descending. E.g. `-id`, -`created_at`.
        - name: filters
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: |

              The customized filter object.

              The filter object can be specified in the format below:
              ```
              {
                  "<field>": {
                      "$<operator1>": "<value1>",
                      ...
                  },
                  ...
                  "<field>": "<value>",
              }
              ```
              `"<field>": "<value>"` is the shorthand for `"<field>": {"$eq": "<value>"}`

              The `field` is provided in string, representing a column in the actual entity table. In case of relational columns, `field` could be provided as a path to the column, separated by a `.`. E.g. `created_by.organization.id`.

              The supported operators consist of:
              - `$eq`, `$ne`, `$lt`, `$gt`, `$le`, `$ge`: Arithmetic operators.
              - `$like`: String operator, case insensitive by default, supports full-width and half-width variations in Japanese.
              - `$in`

              The filter supports several advanced data types:
              - Enum
              - DateTime
              - Timestamp

              If multiple key-values are provided, the filter will apply an `AND` condition to all the conditions.
            title: Filters
          description: |

            The customized filter object.

            The filter object can be specified in the format below:
            ```
            {
                "<field>": {
                    "$<operator1>": "<value1>",
                    ...
                },
                ...
                "<field>": "<value>",
            }
            ```
            `"<field>": "<value>"` is the shorthand for `"<field>": {"$eq": "<value>"}`

            The `field` is provided in string, representing a column in the actual entity table. In case of relational columns, `field` could be provided as a path to the column, separated by a `.`. E.g. `created_by.organization.id`.

            The supported operators consist of:
            - `$eq`, `$ne`, `$lt`, `$gt`, `$le`, `$ge`: Arithmetic operators.
            - `$like`: String operator, case insensitive by default, supports full-width and half-width variations in Japanese.
            - `$in`

            The filter supports several advanced data types:
            - Enum
            - DateTime
            - Timestamp

            If multiple key-values are provided, the filter will apply an `AND` condition to all the conditions.
