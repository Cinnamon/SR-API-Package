                $ref: '#/components/schemas/LoginResponse2FA'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithCode'
              example:
                message: invalid username or password
                code: InvalidCredentialsError
        '403':
          description: This error code is auto-generated but not included in this request, please ignore it!
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithCode'
              example:
                message: 'body.field1.field2: field required, ...'
                code: ValidationError
